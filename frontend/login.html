<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonSang - Authentification</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .blood-drop {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full">
            <!-- Logo et titre -->
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold flex items-center justify-center text-red-700">
                    <i class="fas fa-tint mr-2 blood-drop"></i>
                    DonSang
                </h1>
                <p class="text-gray-600 mt-2">Système de gestion des dons de sang</p>
            </div>
            
            <!-- Formulaire de connexion -->
            <div class="bg-white rounded-lg shadow-md p-8">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">Connexion</h2>
                
                <form id="login-form">
                    <div class="mb-4">
                        <label for="email" class="block text-gray-700 text-sm font-medium mb-2">Email</label>
                        <input type="email" id="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500" required>
                    </div>
                    
                    <div class="mb-6">
                        <label for="password" class="block text-gray-700 text-sm font-medium mb-2">Mot de passe</label>
                        <input type="password" id="password" name="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500" required>
                        <a href="#" class="text-sm text-red-600 hover:text-red-800 mt-1 inline-block">Mot de passe oublié?</a>
                    </div>
                    
                    <button type="submit" class="w-full bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
                        Se connecter
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Pas encore inscrit? 
                        <a href="register.html" class="text-red-600 hover:text-red-800 font-medium">Créer un compte donneur</a>
                    </p>
                </div>
                
                <div class="mt-8 border-t pt-6">
                    <a href="#" class="text-sm text-gray-600 hover:text-gray-800 flex items-center justify-center">
                        <i class="fas fa-lock mr-2"></i>
                        Accès personnel médical
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Simulation du processus d'authentification
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                // Ici, vous feriez normalement une requête au serveur pour l'authentification
                // Pour la démonstration, nous allons simplement rediriger selon le format de l'email
                
                if (email.includes('@medical.donsang.fr')) {
                    // Redirection vers l'interface du personnel médical
                    window.location.href = 'dashboard-staff.html';
                } else {
                    // Redirection vers l'interface donneur
                    window.location.href = 'dashboard-donneur.html';
                }
            });
        });
    </script>
</body>
</html>
