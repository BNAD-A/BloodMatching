<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Système de don de sang</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .blood-drop {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow-lg overflow-hidden max-w-md w-full p-6">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold flex items-center justify-center text-red-700">
                    <i class="fas fa-tint mr-2 blood-drop"></i>
                    DonSang
                </h1>
                <p class="text-gray-600 mt-2">Inscription Donneur</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="prenom" class="block text-sm font-medium text-gray-700">Prénom</label>
                        <input type="text" id="prenom" name="prenom" required 
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500">
                    </div>
                    <div>
                        <label for="nom" class="block text-sm font-medium text-gray-700">Nom</label>
                        <input type="text" id="nom" name="nom" required 
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
                    <input type="password" id="password" name="password" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500">
                </div>

                <div>
                    <label for="passwordConfirm" class="block text-sm font-medium text-gray-700">Confirmer le mot de passe</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500">
                </div>

                <div>
                    <label for="groupe_sanguin" class="block text-sm font-medium text-gray-700">Groupe sanguin</label>
                    <select id="groupe_sanguin" name="groupe_sanguin" required 
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500">
                        <option value="">Sélectionnez votre groupe sanguin</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>

                <div>
                    <label for="ville" class="block text-sm font-medium text-gray-700">Ville</label>
                    <select id="ville" name="ville" required 
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500" 
                            onchange="updateRegions()">
                        <option value="">Sélectionnez votre ville </option>
                        <option value="Casablanca">Casablanca</option>
                        <option value="Rabat">Rabat</option>
                        <option value="Marrakech">Marrakech</option>
                    </select>
                </div>

                <!-- Div pour la région, qui est dynamique -->
                <div id="regionDiv" style="display:none;">
                    <label for="region" class="block text-sm font-medium text-gray-700">Région</label>
                    <select id="region" name="region" required 
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500">
                        <!-- Les options seront ajoutées dynamiquement -->
                    </select>
                </div>

                <div class="flex items-center">
                    <input id="consentement" name="consentement" type="checkbox" required 
                           class="h-4 w-4 text-red-600 focus:ring-red-500 border-gray-300 rounded">
                    <label for="consentement" class="ml-2 block text-sm text-gray-700">
                        Je consens à donner mon sang et j'accepte les <a href="#" class="text-red-600 hover:text-red-500">conditions d'utilisation</a>
                    </label>
                </div>

                <div>
                    <button type="submit" id="registerButton"
                            class="mt-4 w-full py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        S'inscrire
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Déjà inscrit? 
                    <a href="login.html" class="font-medium text-red-600 hover:text-red-500">
                        Se connecter
                    </a>
                </p>
            </div>

            <div id="errorMessage" class="mt-4 text-center text-sm text-red-600 hidden"></div>
        </div>
    </div>

    <script>
        function updateRegions() {
            var ville = document.getElementById("ville").value;
            var regionDiv = document.getElementById("regionDiv");
            var regionSelect = document.getElementById("region");
            regionSelect.innerHTML = "";
            if (ville !== "") {
                regionDiv.style.display = "block";
                var regions = [];
                if (ville === "Casablanca") {
                    regions = ["Oulfa", "Maarif", "Sidi Maarouf"];
                } else if (ville === "Rabat") {
                    regions = ["Agdal", "Hassan", "Souissi"];
                } else if (ville === "Marrakech") {
                    regions = ["Gueliz", "Ménara", "Hivernage"];
                }

                regions.forEach(function(region) {
                    var option = document.createElement("option");
                    option.value = region;
                    option.textContent = region;
                    regionSelect.appendChild(option);
                });
            } else {
                regionDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
