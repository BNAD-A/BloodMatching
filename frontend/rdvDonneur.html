<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Prendre rendez-vous - DonSang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get("edit") === "1") {
        const rdv = JSON.parse(localStorage.getItem("dernierRdv"));
        if (rdv) {
          document.getElementById('date').value = rdv.date;
          document.getElementById('time').value = rdv.time;
          document.getElementById('lieu').value = rdv.lieu;
          document.getElementById('type').value = rdv.type;
        }
      }
    });

    async function confirmerRendezVous(event) {
      event.preventDefault();

      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const lieu = document.getElementById('lieu').value;
      const type = document.getElementById('type').value;

      const rdv = {
        date,
        time,
        lieu,
        type,
        userId: "DON-78945"
      };

      const res = await fetch("http://localhost:5000/api/rendezvous", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(rdv)
      });

      const data = await res.json();
      localStorage.setItem("dernierRdv", JSON.stringify(data));
      window.location.href = "appointmentDonneur.html";
    }
  </script>
</head>
<script>
    async function confirmerRendezVous(event) {
      event.preventDefault();
  
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const lieu = document.getElementById('lieu').value;
      const type = document.getElementById('type').value;
  
      const rdv = {
        date,
        time,
        lieu,
        type,
        userId: "DON-78945"  // À adapter dynamiquement si besoin
      };
  
      // Stocker localement
      localStorage.setItem("rdv_confirmed", JSON.stringify(rdv));
  
      // Redirection vers la page de détails
      window.location.href = "appointmentDonneur.html";
    }
  </script>
  
<body class="bg-gray-50">
  <div class="min-h-screen flex">
    <!-- Sidebar -->
    <!-- Sidebar -->
    <aside class="bg-red-700 text-white w-64 flex-shrink-0 fixed h-full">
        <div class="p-6">
            <h1 class="text-2xl font-bold flex items-center">
                <i class="fas fa-tint mr-2 blood-drop"></i>
                DonSang
            </h1>
            <p class="text-sm text-red-200">Espace Donneur</p>
        </div>
        <nav class="mt-6">
            <ul>
                <li>
                    <a href="dashboardDonneur.html" class="block py-3 px-6 hover:bg-red-600 flex items-center">
                        <i class="fas fa-home-alt mr-3"></i>
                        <span>Tableau de bord</span>
                    </a>
                </li>
                <li>
                    <a href="rdvDonneur.html" 
                     class="block py-3 px-6 bg-red-800 hover:bg-red-600 flex items-center">
                        <i class="fas fa-calendar-alt mr-3"></i>
                        <span>Mes rendez-vous</span>
                    </a>
                </li>
                <li>
                    <a href="historiqueDonneur.html" class="block py-3 px-6 hover:bg-red-600 flex items-center">
                        <i class="fas fa-history mr-3"></i>
                        <span>Historique de dons</span>
                    </a>
                </li>
                <li>
                    <a href="impactDonDonneur.html" class="block py-3 px-6 hover:bg-red-600 flex items-center">
                        <i class="fas fa-heart mr-3"></i>
                        <span>Impact de mes dons</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="block py-3 px-6 hover:bg-red-600 flex items-center">
                        <i class="fas fa-question-circle mr-3"></i>
                        <span>FAQ</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="block py-3 px-6 hover:bg-red-600 flex items-center">
                        <i class="fas fa-cog mr-3"></i>
                        <span>Paramètres</span>
                    </a>
                </li>
                <li>
                    <a href="login.html" class="block py-3 px-6 hover:bg-red-600 flex items-center text-red-200">
                        <i class="fas fa-sign-out-alt mr-3"></i>
                        <span>Déconnexion</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 w-full p-8">
      <div class="bg-white rounded-lg shadow-lg w-full max-w-xl mx-auto p-8">
        <h2 class="text-2xl font-bold text-red-700 mb-6 text-center">Prendre un rendez-vous</h2>
        <form id= "formRdv"  onsubmit="confirmerRendezVous(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Date</label>
            <input id="date" type="date" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Heure</label>
            <input id="time" type="time" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Lieu du don</label>
            <select id="lieu" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
              <option value="">-- Choisir un centre --</option>
              <option value="Saint-Louis">Saint-Louis</option>
              <option value="Pitié-Salpêtrière">Pitié-Salpêtrière</option>
              <option value="Centre mobile">Centre mobile</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Type de don</label>
            <select id="type" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
              <option value="">-- Choisir le type --</option>
              <option value="Sang total">Sang total</option>
              <option value="Plasma">Plasma</option>
              <option value="Plaquettes">Plaquettes</option>
            </select>
          </div>
          <div class="text-center">
            <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">
              Confirmer le rendez-vous
            </button>
          </div>
        </form>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
              const params = new URLSearchParams(window.location.search);
              const edit = params.get("edit");
          
              if (edit && localStorage.getItem("rdv_confirmed")) {
                const rdv = JSON.parse(localStorage.getItem("rdv_confirmed"));
                document.getElementById("date").value = rdv.date;
                document.getElementById("time").value = rdv.time;
                document.getElementById("lieu").value = rdv.lieu;
                document.getElementById("type").value = rdv.type;
              }
          
              document.getElementById("formRdv").addEventListener("submit", (e) => {
                e.preventDefault();
                const rdv = {
                  date: document.getElementById("date").value,
                  time: document.getElementById("time").value,
                  lieu: document.getElementById("lieu").value,
                  type: document.getElementById("type").value
                };
                localStorage.setItem("rdv_confirmed", JSON.stringify(rdv));
                window.location.href = "appointmentDonneur.html";
              });
            });
          </script>
          
      </div>
    </main>
  </div>
</body>
</html>
